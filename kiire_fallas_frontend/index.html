<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiire Fallas</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Kiire Fallas</h1>
      <p>Gestión básica de tickets</p>
      <p><a href="./admin.html">Ir a administración</a></p>
    </header>

    <section class="card">
      <h2>Crear ticket</h2>
      <form id="ticketForm" class="form-grid">
        <div class="form-group">
          <label for="nombre_reportante">Nombre del reportante</label>
          <input type="text" id="nombre_reportante" required />
        </div>

        <div class="form-group">
          <label for="correo_reportante">Correo del reportante</label>
          <input type="email" id="correo_reportante" required />
        </div>

        <div class="form-group">
          <label for="comercio">Comercio</label>
          <input type="text" id="comercio" required />
        </div>

        <div class="form-group">
          <label for="nit">NIT</label>
          <input type="text" id="nit" required />
        </div>

        <div class="form-group">
          <label for="titulo_error">Título del error</label>
          <input type="text" id="titulo_error" maxlength="100" required />
        </div>

        <div class="form-group">
          <label for="producto">Producto</label>
          <select id="producto" required>
            <option value="">Seleccione</option>
            <option value="Minidatáfono">Minidatáfono</option>
            <option value="Kiirepro">Kiirepro</option>
            <option value="Recibe pagos con tu cel">Recibe pagos con tu cel</option>
            <option value="Link de pagos">Link de pagos</option>
          </select>
        </div>

        <div class="form-group">
          <label for="prioridad">Prioridad</label>
          <select id="prioridad" required>
            <option value="">Seleccione</option>
            <option value="Baja">Baja</option>
            <option value="Media">Media</option>
            <option value="Alta">Alta</option>
            <option value="Crítica">Crítica</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" rows="4" required></textarea>
        </div>

        <div class="form-group">
          <label for="imagen">Adjuntar imagen</label>
          <input type="file" id="imagen" accept="image/*" />
        </div>

        <div class="form-actions full-width">
          <button type="submit">Crear ticket</button>
        </div>
      </form>

      <div id="mensaje" class="message"></div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Tickets</h2>
        <button id="btnRecargar">Recargar</button>
      </div>

      <div class="table-wrapper">
        <table id="ticketsTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Código</th>
              <th>Comercio</th>
              <th>NIT</th>
              <th>Título</th>
              <th>Producto</th>
              <th>Prioridad</th>
              <th>Responsable</th>
              <th>Correo responsable</th>
              <th>Estado</th>
              <th>Imagen</th>
              <th>Observación</th>
            </tr>
          </thead>
          <tbody id="ticketsBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
